clusters:
  - name: Phase Boundary
    context: >
      The pipeline has two phases that must never mix. Phase 1 (Collectors)
      gathers data with zero LLM involvement. Phase 2 (Adapters) synthesises
      using one LLM call each. A collector that calls the LLM defeats the
      entire cost model and breaks the architecture's core property.
    golden_file: src/compass/collectors/base.py
    rules:
      - id: pb-01
        rule: >
          Collectors must never import or call LLM, provider, or adapter code —
          return raw data only.
        why: >
          Phase 1 is zero-LLM by design. Mixing synthesis into collection makes
          every re-run expensive, breaks the budget cap guarantee, and makes
          adapters depend on collectors being present.
        example: |
          # correct
          class RepomixCollector:
              def collect(self, repo_path: str) -> dict:
                  result = subprocess.run(["repomix", "--compress", repo_path], ...)
                  return {"source": result.stdout}

          # wrong
          class RepomixCollector:
              def collect(self, repo_path: str) -> dict:
                  raw = subprocess.run(["repomix", ...], ...)
                  summary = synthesize(raw)   # Phase 2 territory
                  return {"source": summary}

      - id: pb-02
        rule: >
          Adapters must read from the persisted AnalysisContext — never receive
          live collector output directly.
        why: >
          Passing live collector output to an adapter means the adapter cannot
          be re-run independently. The entire point of persisting AnalysisContext
          is to decouple the two phases.
        example: |
          # correct
          context = AnalysisContext.load(repo_path)
          rules_adapter.run(context)

          # wrong
          raw = collector.collect(repo_path)
          rules_adapter.run(raw)   # adapter now depends on collector being present

      - id: pb-03
        rule: >
          Collector modules must not import from compass.adapters,
          compass.synthesis, or compass.providers at the top level.
        why: >
          Import-time coupling is enough to break the phase boundary. Even if
          the import is never called, it creates a hidden dependency that is
          invisible to future developers and can trigger accidental LLM calls.
        example: |
          # correct
          # no imports from adapters, synthesis, or providers in any collector file

          # wrong
          from compass.synthesis import synthesize
          from compass.adapters.rules import RulesAdapter

  - name: Adapter Contract
    context: >
      Every adapter follows the same interface: declare which context sections
      it needs, define its output schema, name its prompt template, and implement
      run(). This contract is what makes adapters independently selectable via
      --adapters and re-runnable without re-collecting.
    golden_file: src/compass/adapters/base.py
    rules:
      - id: ac-01
        rule: >
          Every adapter must extend BaseAdapter and implement context_sections,
          output_schema, prompt_template, and run().
        why: >
          An adapter that bypasses the interface cannot be selected via --adapters,
          cannot be re-run independently, and breaks the runner's dispatch logic.
        example: |
          # correct
          class RulesAdapter(BaseAdapter):
              context_sections = ["architecture", "patterns", "git_patterns", "docs"]
              output_schema = RULES_SCHEMA
              prompt_template = "prompts/templates/extract_rules.md"

              def run(self, context: AnalysisContext) -> AdapterOutput:
                  ...

          # wrong
          class RulesAdapter:
              def run(self, raw_data):
                  ...

      - id: ac-02
        rule: >
          Adapters must declare only the context sections they actually use —
          SummaryAdapter uses architecture and git_patterns only.
        why: >
          Context slicing controls token cost. SummaryAdapter skipping patterns,
          docs, and source saves significant tokens per call. Loading unused
          sections wastes budget silently with no visible error.
        example: |
          # correct
          class SummaryAdapter(BaseAdapter):
              context_sections = ["architecture", "git_patterns"]

          # wrong
          class SummaryAdapter(BaseAdapter):
              context_sections = ["architecture", "patterns", "git_patterns", "docs"]

      - id: ac-03
        rule: >
          v1 ships exactly two adapters — RulesAdapter and SummaryAdapter.
          Do not add adapters outside FINAL.md scope.
        why: >
          The v1 adapter scope is fixed. Adding adapters introduces untested
          surface area and delays the milestone without a designed architecture
          to support them.
        example: |
          # correct
          from compass.adapters.rules import RulesAdapter
          from compass.adapters.summary import SummaryAdapter

          # wrong
          from compass.adapters.docs import DocsAdapter   # v2, not v1

  - name: LLM Integration
    context: >
      All LLM calls go through subprocess against the CLI — never the Anthropic
      SDK or direct API. Provider logic lives in providers/ only. This is what
      makes Compass work with a subscription rather than requiring an API key.
    golden_file: src/compass/providers/claude.py
    rules:
      - id: llm-01
        rule: >
          LLM calls must use subprocess.run() against the CLI — never import
          the Anthropic SDK or call the API directly.
        why: >
          Direct API calls require an API key and credits. The subprocess approach
          requires only a CLI subscription. Bypassing this breaks the
          distribution model and the budget cap guarantee.
        example: |
          # correct
          result = subprocess.run(
              ["claude", "--print", "--output-format", "text", prompt],
              capture_output=True,
              text=True,
          )

          # wrong
          import anthropic
          client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])

      - id: llm-02
        rule: >
          All provider logic must live in providers/ — never inline subprocess
          calls in adapters.
        why: >
          Adding a second provider (Codex) should touch exactly one file.
          Inlining subprocess calls in adapters makes that impossible and
          scatters provider logic across the codebase.
        example: |
          # correct
          from compass.providers import call_provider

          def run(self, context: AnalysisContext) -> AdapterOutput:
              raw_md = call_provider(prompt, provider=self.provider)
              return self.parse_output(raw_md)

          # wrong
          def run(self, context: AnalysisContext) -> AdapterOutput:
              result = subprocess.run(["claude", "--print", prompt], ...)

      - id: llm-03
        rule: >
          Budget cap must be passed as --max-budget-usd when configured —
          never ignored or hardcoded.
        why: >
          The budget cap is a user-configurable safety valve. An adapter that
          ignores it can silently exceed the user's intended spend with no
          warning or error.
        example: |
          # correct
          args = ["claude", "--print", "--output-format", "text", prompt]
          if budget:
              args += ["--max-budget-usd", str(budget)]
          subprocess.run(args, ...)

          # wrong
          subprocess.run(["claude", "--print", prompt], ...)   # budget ignored

  - name: AnalysisContext Persistence
    context: >
      AnalysisContext is the persisted handoff between phases. It stores
      collected data plus a repo hash for staleness detection. Persistence
      is what makes adapters independently re-runnable. The hash is what
      makes --reanalyze meaningful.
    golden_file: src/compass/domain/analysis_context.py
    rules:
      - id: acp-01
        rule: >
          AnalysisContext must be persisted to target-repo/.compass/analysis_context.json
          after Phase 1 completes — never held only in memory.
        why: >
          If context is only in memory, every adapter run requires re-collection.
          This defeats the cost model and makes the --adapters flag meaningless —
          you cannot re-run a single adapter without running all collectors first.
        example: |
          # correct
          context.save(repo_path / ".compass" / "analysis_context.json")

          # wrong
          context = collectors.run(repo_path)
          adapter.run(context)   # re-collection required every time

      - id: acp-02
        rule: >
          AnalysisContext must store a repo hash alongside the collected data —
          use git rev-parse HEAD.
        why: >
          Without the hash, Compass cannot detect whether the repo has changed
          since last analysis. Stale results are served silently with no
          warning, and --reanalyze has no trigger condition.
        example: |
          # correct
          {
            "repo_hash": "abc123...",
            "collected_at": "2026-04-16T10:00:00Z",
            "architecture": {},
            "patterns": {},
            "git_patterns": {},
            "docs": {}
          }

          # wrong
          {
            "architecture": {},
            "git_patterns": {}
          }

      - id: acp-03
        rule: >
          On hash mismatch, warn the user and require --reanalyze — never
          silently re-collect or silently serve stale data.
        why: >
          Silent re-collection runs costs the user did not expect. Silent stale
          data produces wrong output. The user must be in control of when
          re-analysis happens.
        example: |
          # correct
          if stored_hash != current_hash:
              print("Warning: repo has changed. Run with --reanalyze to refresh.")
              sys.exit(1)

          # wrong
          if stored_hash != current_hash:
              context = collectors.run(repo_path)   # user did not ask for this
